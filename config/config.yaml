server:
  port: 8080
  mode: debug  # debug / release / test

# Database
database:
  host: 127.0.0.1
  port: 3306
  user: oa
  password: 123456
  dbname: oa
  charset: utf8mb4
  table_prefix: ""
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600  # seconds
  log_level: warn  # silent / error / warn / info

# Redis
redis:
  host: 127.0.0.1
  port: 6379
  password: 123456
  db: 0
  prefix: ""
  pool_size: 10

# Session
session:
  expire: 3600  # seconds
  cookie_prefix: "29E6_"

# Security
security:
  md5_key: ""
  api_salt: "123456"

# Log
log:
  error_path: /var/log/gin_demo
  level: info  # debug / info / warn / error

# Environment
environment: development
debug: false
